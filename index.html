<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enviar publicación a Telegram</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: 30px auto;
        padding: 0 16px;
      }
      .row {
        margin-bottom: 12px;
      }
      input, button, select {
        padding: 10px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
      }
      button {
        cursor: pointer;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        margin-top: 12px;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #f7f7f7;
        border-radius: 6px;
        padding: 10px;
      }
      .muted {
        color: #666;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Enviar publicación de Instagram → Telegram</h1>
    <p class="muted">Selecciona una plantilla, pega el link y envía el mensaje al chat.</p>

    <div class="row">
      <input id="token" placeholder="DASHBOARD_TOKEN (opcional)" />
    </div>

    <div class="row">
      <button id="saveToken">Guardar token</button>
    </div>

    <div class="row">
      <select id="template"></select>
    </div>

    <div class="row">
      <input id="postUrl" placeholder="https://www.instagram.com/p/..." />
    </div>

    <div class="row">
      <button id="sendNow">Enviar a Telegram</button>
    </div>

    <div class="card">
      <h3>Respuesta</h3>
      <pre id="output">Sin datos todavía.</pre>
    </div>

    <script>
      const output = document.getElementById("output");
      const tokenInput = document.getElementById("token");
      const templateSelect = document.getElementById("template");
      const postUrlInput = document.getElementById("postUrl");

      tokenInput.value = localStorage.getItem("dashboard_token") || "";

      function getHeaders() {
        const token = localStorage.getItem("dashboard_token") || "";
        const headers = { "content-type": "application/json" };
        if (token) {
          headers["x-dashboard-token"] = token;
        }
        return headers;
      }

      async function callApi(url, options = {}) {
        const response = await fetch(url, {
          ...options,
          headers: {
            ...getHeaders(),
            ...(options.headers || {})
          }
        });
        const text = await response.text();
        let parsed = text;
        try {
          parsed = JSON.parse(text);
        } catch (_) {}

        output.textContent = JSON.stringify(
          {
            status: response.status,
            data: parsed
          },
          null,
          2
        );

        return { status: response.status, data: parsed };
      }

      async function loadTemplates() {
        const result = await callApi("/.netlify/functions/dashboard-send");
        if (!result.data || !result.data.ok || !Array.isArray(result.data.templates)) {
          return;
        }

        templateSelect.innerHTML = "";
        result.data.templates.forEach((template) => {
          const option = document.createElement("option");
          option.value = template.id;
          option.textContent = template.label;
          templateSelect.appendChild(option);
        });
      }

      document.getElementById("saveToken").addEventListener("click", () => {
        localStorage.setItem("dashboard_token", tokenInput.value.trim());
        output.textContent = "Token guardado en el navegador.";
      });

      document.getElementById("sendNow").addEventListener("click", async () => {
        await callApi("/.netlify/functions/dashboard-send", {
          method: "POST",
          body: JSON.stringify({
            templateId: templateSelect.value,
            postUrl: postUrlInput.value.trim()
          })
        });
      });

      loadTemplates();
    </script>
  </body>
</html>
