services:
  - type: worker
    name: insta-telegram-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python src/main.py
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: INSTAGRAM_USERNAME
        sync: false
      - key: POLL_SECONDS
        value: "300"
      - key: STATE_FILE
        value: state.json
      - key: SEND_ON_FIRST_RUN
        value: "false"
